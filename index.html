<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HackerLab PRO // v7.0 25 Machines</title>
<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1400px 900px at 15% 5%,#0f172a 0%,var(--bg) 70%);color:var(--text);font-family:var(--font-mono);height:100vh;overflow:hidden;background-image:linear-gradient(rgba(0,255,157,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,0.025) 1px,transparent 1px);background-size:24px 24px}
  header{height:44px;background:var(--panel);border-bottom:1px solid rgba(0,255,157,0.18);display:flex;align-items:center;padding:0 14px}
  header h1{font-size:13px;letter-spacing:2px;color:var(--accent)}
  header.status{margin-left:auto;font-size:11px;color:var(--muted)}
.wrap{display:flex;height:calc(100vh - 44px)}
.sidebar{width:280px;background:rgba(11,18,32,0.85);border-right:1px solid rgba(0,255,157,0.12);overflow-y:auto}
.playbook{width:360px;background:rgba(11,18,32,0.85);border-left:1px solid rgba(0,255,157,0.12);display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;background:#000}
.panel-h{font-size:11px;padding:10px 14px;color:var(--accent2);border-bottom:1px solid rgba(0,255,157,0.1);text-transform:uppercase}
.room{padding:10px 14px;border-bottom:1px solid rgba(0,255,157,0.04);opacity:0.6}
.room.active{background:rgba(0,200,255,0.12);border-left:3px solid var(--accent);opacity:1}
.room.name{font-size:12px;color:var(--text)}
.room.meta{font-size:10px;color:var(--muted);margin-top:3px}
.tag{padding:2px 6px;border:1px solid;border-radius:4px;font-size:9px;margin-right:4px}
.tag.easy{color:var(--accent);border-color:var(--accent)}.tag.med{color:var(--warn);border-color:var(--warn)}.tag.hard{color:var(--danger);border-color:var(--danger)}
.task{padding:8px 12px;border-bottom:1px dashed rgba(0,255,157,0.08);font-size:11px}
.task.cmd{color:var(--accent2);cursor:pointer;word-break:break-all}
.task.cmd:hover{background:rgba(0,255,157,0.08)}
.playbook textarea{flex:1;background:#060a12;color:var(--muted);border:none;outline:none;padding:12px;font-size:11px;resize:none}
.playbook button{background:var(--panel);color:var(--accent);border-top:1px solid rgba(0,255,157,0.2);padding:8px;font-size:11px;cursor:pointer}
.term-head{height:30px;background:#0b0b0b;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--muted)}
.term{flex:1;padding:14px;overflow-y:auto;font-size:12px;line-height:1.5;white-space:pre-wrap}
.prompt{color:var(--accent)}.cmd{color:var(--accent2)}.out{color:var(--text)}.err{color:var(--danger)}.warn{color:var(--warn)}
.input-line{display:flex}
.input-line input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-mono);font-size:12px}
</style>
</head>

let session={mode:'kali',room:null, cwd:'~', vfs:['rooms.txt','exploits','wordlists'], msf:false, msfModule:null, msfRhosts:null, msfSession:false, msfSessionId:1, meterFs:['root.txt','user.txt','/etc/passwd']};
const term=document.getElementById('terminal');
const input=document.getElementById('cmdInput');
const promptEl=document.getElementById('prompt');
const termHead=document.getElementById('termHead');
const statusBar=document.getElementById('statusBar');
const playbookTitle=document.getElementById('playbookTitle');

function log(l,c='out'){term.innerHTML+=`<div class="${c}">${l}</div>`;term.scrollTop=term.scrollHeight}
function pcmd(l){log(`<span class="prompt">${promptEl.textContent}</span> <span class="cmd">${l}</span>`)}

function updatePrompt(){
  if(session.msfSession){promptEl.textContent='meterpreter > ';termHead.textContent='meterpreter 1';return}
  if(session.msf){promptEl.textContent='msf6 > ';termHead.textContent='msf6';return}
  promptEl.textContent = session.mode==='kali'? `kali@htb:${session.cwd}$ ` : `${session.room.user}@${session.room.name.toLowerCase().replace(' ','')}:~$ `;
  termHead.textContent = session.mode==='kali'? `root@kali: ${session.cwd}` : `${session.room.user}@${session.room.name.toLowerCase().replace(' ','')}: ~/`;
}

function setPlaybook(type,room=null){
  if(type==='kali'){playbookTitle.textContent='Playbook: KALI';renderKaliPlaybook()}
  if(type==='msf'){playbookTitle.textContent='Playbook: METASPLOIT';renderMsfPlaybook()}
  if(type==='msfpost'){playbookTitle.textContent='Playbook: POST-EXPLOIT';renderMsfPostPlaybook()}
  if(type==='room'){playbookTitle.textContent=`Playbook: ${room.name}`;renderRoomPlaybook(room)}
}

function setSession(mode,room=null){
  session={...session, mode, room, cwd:'~', msf:false, msfModule:null, msfRhosts:null, msfSession:false};
  if(mode==='kali'){
    statusBar.textContent='SESSION: KALI';
    log('[+] Returned to Kali','warn');
    setPlaybook('kali');
    document.getElementById('notes').value=localStorage.getItem(`notes_kali`)||'';
  }else{
    statusBar.textContent=`SESSION: ${room.name} | ${room.ip}`;
    log(`Linux ${room.name} 5.4.0-42-generic x86_64\nLast login: Mon Apr 8 12:34:56 2026 from 10.10.14.2`,'out');
    setPlaybook('room',room);
    document.getElementById('notes').value=localStorage.getItem(`notes_${room.id}`)||'';
  }
  updatePrompt();
  renderRooms();
}

function renderRooms(){document.getElementById('roomList').innerHTML=rooms.map(r=>`<div class="room ${session.room?.id===r.id?'active':''}"><div class="name">${r.name}</div><div class="meta"><span class="tag ${r.diff}">${r.diff.toUpperCase()}</span> ${r.ip} | ${r.user}@${r.ip}</div></div>`).join('')}
function renderKaliPlaybook(){document.getElementById('taskList').innerHTML=kaliCmds.map(c=>`<div class="task"><div class="task cmd" onclick="input.value=\`${c.split(':')[0].trim()}\`;input.focus()">${c}</div></div>`).join('')}
function renderMsfPlaybook(){document.getElementById('taskList').innerHTML=msfCmds.map(c=>`<div class="task"><div class="task cmd" onclick="input.value=\`${c.split(':')[0].trim()}\`;input.focus()">${c}</div></div>`).join('')}
function renderMsfPostPlaybook(){document.getElementById('taskList').innerHTML=msfPostCmds.map(c=>`<div class="task"><div class="task cmd" onclick="input.value=\`${c.split(':')[0].trim()}\`;input.focus()">${c}</div></div>`).join('')}
function renderRoomPlaybook(room){document.getElementById('taskList').innerHTML=room.playbook.map(c=>`<div class="task"><div class="task cmd" onclick="input.value=\`${c}\`;input.focus()">${c}</div></div>`).join('')}

function sim(cmd, room){
  if(cmd.startsWith('nmap')) return room.nmap;
  if(cmd.startsWith('gobuster')) return `===============================================================\n/.admin${room.id} (Status: 200) [Size: 1024]\n/.internal${room.id} (Status: 301) [Size: 178]\n===============================================================`;
  if(cmd.startsWith('sqlmap')) return `[+] 'id' is MySQL injectable\n| username | password |\n| admin | THM{sql_dump} |`;
  if(cmd==='sudo -l') return `User ${room.user} may run the following commands:\n (ALL : ALL) ALL`;
  if(cmd==='ftp 10.10.10.12') return `220 vsFTPD\n230 Login successful.\nftp> get note.txt\n226 Transfer complete.`;
  if(cmd.startsWith('redis-cli')) return `127.0.0.1:6379> OK\n127.0.0.1:6379> OK`;
  if(cmd.startsWith('cat user.txt')) return `THM{${room.name.replace(' ','_')}_USER_FLAG_8f2k}`;
  if(cmd.startsWith('cat root.txt')) return `THM{${room.name.replace(' ','_')}_ROOT_FLAG_9m1q}`;
  if(cmd==='whoami') return room.user;
  if(cmd==='ls') return `user.txt root.txt notes.txt`;
  return `[+] Command output for: ${cmd}`;
}

function runKali(cmd){
  const parts = cmd.trim().split(' ');
  const base = parts[0];
  const args = parts.slice(1);

  if(session.msfSession){
    if(base==='exit'){session.msfSession=false;log('[*] Backgrounded session 1','warn');setPlaybook('msf');updatePrompt();return}
    if(base==='whoami'){log('www-data','out');return}
    if(base==='sysinfo'){log('Computer: linux-vuln\nOS: Linux 4.15.0-20-generic','out');return}
    if(base==='shell'){log('[*] Opening shell...\nwww-data@vulnversity:/var/www$ ','out');return}
    if(base==='background'){session.msfSession=false;log('[*] Backgrounded session 1','warn');setPlaybook('msf');updatePrompt();return}
    if(base==='upload'){
      const lfile=args[0], rfile=args[1];
      if(!lfile ||!rfile){log('[-] Usage: upload <lfile> <rfile>','err');return}
      session.meterFs.push(rfile);log(`[*] Uploading: ${lfile} -> ${rfile}\n[+] Uploaded 1 file: ${rfile} (1024 bytes)`,'out');return
    }
    if(base==='download'){
      const rfile=args[0], lfile=args[1];
      if(!rfile ||!lfile){log('[-] Usage: download <rfile> <lfile>','err');return}
      if(!session.meterFs.includes(rfile)){log(`[-] File not found: ${rfile}`,'err');return}
      log(`[*] Downloading: ${rfile} -> ${lfile}\n[+] Downloaded 1 file: ${lfile} (512 bytes)`,'out');return
    }
    if(base==='execute'){
      const fIdx=args.indexOf('-f');
      const file=fIdx!==-1?args[fIdx+1]:null;
      if(!file){log('[-] Usage: execute -f <file>','err');return}
      log(`[*] Executing: ${file}\n[+] Process ${Math.floor(Math.random()*5000)} created.`,'warn');return
    }
    log(`meterpreter > ${cmd}\n[+] Command executed`,'out');return
  }

  if(session.msf){
    if(base==='exit'){session.msf=false;session.msfModule=null;session.msfRhosts=null;log('[*] Exiting Metasploit','warn');setPlaybook('kali');updatePrompt();return}
    if(base==='search'){
      const term=args.join(' ');
      const results=msfModules.filter(m=>m.toLowerCase().includes(term.toLowerCase()));
      log(results.length?results.join('\n'):'No matches','out');return
    }
    if(base==='use' && args[0]?.startsWith('exploit/')){session.msfModule=args[0];log(`[+] Using ${session.msfModule}`,'out');return}
    if(base==='set' && args[0]==='RHOSTS'){session.msfRhosts=args[1];log(`RHOSTS => ${session.msfRhosts}`,'out');return}
    if(base==='set' && args[0]==='RPORT'){log(`RPORT => ${args[1]}`,'out');return}
    if(base==='run' || base==='exploit'){
      if(!session.msfModule){log('[-] No module selected. Use use exploit/...','err');return}
      if(!session.msfRhosts){log('[-] No RHOSTS set. Use set RHOSTS <ip>','err');return}
      log(`[*] Started reverse TCP handler on 10.10.14.2:4444\n[*] Sending stage...\n[+] Shell session ${session.msfSessionId} opened (10.10.14.2:4444 -> ${session.msfRhosts}:80)`,'warn');return
    }
    if(base==='sessions'){
      if(args[0]==='-l'){log(`Active sessions\n==============\n\n Id Name Type Information Connection\n -- ---- ---- ----------- ----------\n 1 meterpreter linux www-data@10.10.10.11 10.10.14.2:4444 -> ${session.msfRhosts||'10.10.10.11'}:80`,'out');return}
      if(args[0]==='-i'){session.msfSession=true;setPlaybook('msfpost');log('[*] Starting interaction with 1...\nmeterpreter > ','warn');updatePrompt();return}
    }
    if(base==='back'){session.msfModule=null;log('[-] Back from module','out');return}
    log(`[-] Unknown command: ${cmd}`,'err');return
  }

  if(base==='clear'){term.innerHTML='';return}
  if(base==='help'){log(kaliCmds.join('\n'),'out');return}
  if(base==='ipconfig'){log(`eth0: flags=4163<UP,BROADCAST,RUNNING,MULTICAST> mtu 1500\n inet 10.10.14.2 netmask 255.255.255.0 broadcast 10.10.14.255`,'out');return}
  if(base==='msfconsole'){
    session.msf=true;
    log(`

        =[ metasploit v6.4.0-dev ]\n+ --=[ 2450 exploits - 1254 auxiliary - 408 post ]\n+ --=[ 1191 payloads - 47 encoders - 13 nops ]\n+ --=[ 9 evasion ]\n\nmsf6 > `,'warn');
    setPlaybook('msf');
    updatePrompt();return
  }
  if(base==='nmap'){const ip=args[0];const r=rooms.find(x=>x.ip===ip);log(r?r.nmap:`Nmap scan report for ${ip}\nAll 1000 scanned ports are closed`,'out');return}
  if(base==='ls'){log(session.vfs.join(' '),'out');return}
  if(base==='cd'){
    if(!args[0] || args[0]==='~'){session.cwd='~';updatePrompt();return}
    if(args[0]==='..'){session.cwd='~';updatePrompt();return}
    if(session.vfs.includes(args[0])){session.cwd=`~/${args[0]}`;updatePrompt();return}
    log(`bash: cd: ${args[0]}: No such file or directory`,'err');return
  }
  if(base==='mkdir'){
    if(!args[0]){log('mkdir: missing operand','err');return}
    if(session.vfs.includes(args[0])){log(`mkdir: cannot create directory '${args[0]}': File exists`,'err');return}
    session.vfs.push(args[0]);log('','out');return
  }
  if(base==='rm'){
    if(!args[0]){log('rm: missing operand','err');return}
    if(!session.vfs.includes(args[0])){log(`rm: cannot remove '${args[0]}': No such file or directory`,'err');return}
    session.vfs=session.vfs.filter(f=>f!==args[0]);log('','out');return
  }
  if(base==='cat' && args[0]==='rooms.txt'){log(rooms.map(r=>`${r.name} ${r.ip} ${r.user}@${r.ip}`).join('\n'),'out');return}
  if(base==='ping'){log(`64 bytes from ${args[0]}: ttl=64 time=12.1 ms`,'out');return}
  if(base==='enum'){log(`${rooms.length} machines loaded. Use ssh user@ip`,'out');return}
  if(base==='whoami'){log(`kali`,'out');return}
  if(base==='ssh'){
    const match = cmd.match(/ssh ([\w-]+)@([\d.]+)/);
    if(!match){log('Usage: ssh user@ip','err');return}
    const [,user,ip] = match;
    const room = rooms.find(r=>r.ip===ip && r.user===user);
    if(room){setSession('room',room);return}
    log(`ssh: Permission denied, please try again.`,'err');return
  }
  log(`bash: ${base}: command not found`,'err');
}

function runRoom(cmd){
  const base = cmd.trim().split(' ')[0];
  if(base==='exit'){setSession('kali');return}
  if(base==='nmap'){log('Error: nmap must run from Kali','err');return}
  log(sim(cmd, session.room),'out');
}

function run(cmd){pcmd(cmd); if(session.mode==='kali') runKali(cmd); else runRoom(cmd)}

input.addEventListener('keydown',e=>{if(e.key==='Enter'&&input.value){run(input.value);input.value=''}});
function saveNotes(){if(session.room){localStorage.setItem(`notes_${session.room.id}`,document.getElementById('notes').value);}else{localStorage.setItem(`notes_kali`,document.getElementById('notes').value);}log('[+] Notes Saved','warn')}

renderRooms();
setSession('kali');
</script>
